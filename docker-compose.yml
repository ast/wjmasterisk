services:
  asterisk:
    build:
      context: .
      dockerfile: Dockerfile
    image: sm6wjm.se/asterisk:latest
    container_name: asterisk-server
    restart: unless-stopped
    
    # Mapping SIP and the RTP range defined in your notes
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
      - "10000-10010:10000-10010/udp"

    volumes:
      - ./etc-asterisk:/etc/asterisk
      # Added for persistent logs and recordings
      - asterisk_data:/var/lib/asterisk
      - asterisk_logs:/var/log/asterisk

    # Ensures Asterisk can handle timing/network priority if needed
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN

volumes:
  asterisk_data:
  asterisk_logs:
