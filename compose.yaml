# Compose alternative to `just run`. Same image, same host-network
# stance (SIP/RTP don't survive bridge-NAT cleanly), plus:
#   - restart policy so it comes up at boot
#   - SIGINT shutdown (Asterisk doesn't exit cleanly on SIGTERM)
#   - persistent volumes for voicemail, CDRs, logs
#   - healthcheck via `core waitfullybooted`

services:
  asterisk:
    image: ghcr.io/ast/wjmasterisk:latest
    container_name: asterisk

    # Host networking: Asterisk binds directly on the host's interfaces
    # (5060/udp+tcp, 5061/tcp, RTP 10000-10010/udp from rtp.conf). No
    # `ports:` mapping needed — host mode ignores it, and bridge-NAT
    # breaks SIP SDP (clients receive the bridge IP instead of the LAN IP).
    network_mode: host

    restart: unless-stopped

    # Asterisk shuts down cleanly only on SIGINT (Docker default is
    # SIGTERM). Without this, `compose down` cuts in-flight calls and
    # half-writes voicemail recordings.
    stop_signal: SIGINT
    stop_grace_period: 15s

    volumes:
      # Configuration — bind-mounted live. Edit a file and reload from
      # the Asterisk console (`pjsip reload`, `dialplan reload`).
      - ./etc-asterisk:/etc/asterisk
      # Voicemail recordings + custom prompts + Music-on-Hold files.
      - asterisk_spool:/var/spool/asterisk
      # CDRs, sounds the build installed, astdb.
      - asterisk_lib:/var/lib/asterisk
      # full / messages / queue_log.
      - asterisk_log:/var/log/asterisk

    # Opts this container into restarts by the autoheal sidecar below
    # when the healthcheck flips to unhealthy.
    labels:
      - autoheal=true

    healthcheck:
      # Exercise the SQLite write path (the same one registrations use)
      # via a single CLI call: `database put` prints "Updated database
      # successfully" on success, anything else (disk full, astdb corrupt,
      # …) fails the grep. One `asterisk -rx` per check = one pair of
      # noisy "Remote UNIX connection" log lines (verbose level 3),
      # instead of two; 60 s interval halves that again. `>-` is a YAML
      # folded scalar — joined into one shell command at runtime.
      test:
        - "CMD-SHELL"
        - >-
            asterisk -rx "database put healthcheck stamp ok"
            | grep -q "Updated database successfully"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

    # Docker's default json-file driver has no rotation. Without these
    # caps a chatty failure mode (e.g. astdb errors spamming the log a
    # few times per second) can fill the host disk in days. Caps the
    # log at 3 × 10 MB per container = 30 MB max.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Watches containers labelled `autoheal=true` (the default) and
  # restarts any that report unhealthy. Without this, compose's
  # `restart: unless-stopped` only acts on container *exit*, so the
  # asterisk healthcheck above would be purely informational. Only
  # needs the docker socket — no network of its own.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  asterisk_spool:
  asterisk_lib:
  asterisk_log:
