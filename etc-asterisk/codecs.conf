; /etc/asterisk/codecs.conf — per-codec tunables.
;
; Empty [opus] section = use codec_opus's built-in defaults
; (max bandwidth fullband, VoIP-mode encoder, FEC on, etc.). Tune here
; if you need to constrain bitrate or change complexity:
;   bitrate = 20000             ; bits/sec — cap for constrained networks
;   complexity = 10             ; 0-10, lower = less CPU
;   fec = true                  ; forward error correction (handy on lossy links)
;   dtx = false                 ; discontinuous transmission (don't send silence)

[opus]
