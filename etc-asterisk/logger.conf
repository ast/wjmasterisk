; /etc/asterisk/logger.conf — what gets logged where.
;
; Each line under [logfiles] is:  <filename> = <comma-separated levels>
; "console" is special — it goes to stdout (visible in `docker logs` /
; the foreground console). Any other name becomes a file under
; /var/log/asterisk/ (created on first write; can be rotated with
; `logger rotate` from the CLI).
;
; Available levels:
;   debug     very chatty; only useful when chasing a bug
;   verbose   call flow, dialplan execution (the bulk of useful info)
;   notice    expected status events (boot, reload, …)
;   warning   recoverable problems
;   error     non-recoverable problems
;   security  authentication / auth failures (separate stream)

[general]

[logfiles]
console = verbose,notice,warning,error

; Uncomment to also keep file logs:
;messages = notice,warning,error
;full     = verbose,notice,warning,error,debug
;security = security
