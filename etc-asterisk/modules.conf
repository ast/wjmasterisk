; /etc/asterisk/modules.conf
;
; autoload = no means: only load modules we explicitly list. This gives a
; predictable, minimal runtime — nothing sneaks in by surprise. The cost
; is having to list every required module, including dependencies. If a
; module declines to load with "missing dependency: X" at boot, add X here.
;
; Convention used below: modules grouped by role with a short header.

[modules]
autoload = no

; --- Applications ------------------------------------------
; Dialplan verbs (Dial, Voicemail, Playback, …). Only what the dialplan uses.

load = app_bridgewait.so
load = app_dial.so
load = app_echo.so
load = app_playback.so
load = app_stack.so
load = app_verbose.so
load = app_voicemail.so
load = app_directory.so

; --- Bridging ----------------------------------------------
; Two-party and multi-party call bridges. Required for any call to connect.

load = bridge_builtin_features.so
load = bridge_builtin_interval_features.so
load = bridge_holding.so
load = bridge_native_rtp.so
load = bridge_simple.so
load = bridge_softmix.so

; --- Call Detail Records -----------------------------------
; CSV logging via cdr_custom.conf. res_cdrel_custom is the helper
; resource that cdr_custom depends on in Asterisk 23+.

load = res_cdrel_custom.so
load = cdr_custom.so

; --- Channel Drivers ---------------------------------------
; chan_pjsip is the modern SIP stack. chan_bridge_media bridges
; media across different channel types.

load = chan_bridge_media.so
load = chan_pjsip.so

; --- Codecs ------------------------------------------------
; Transcoding between formats. codec_resample bridges sample rates
; (e.g. opus@48k <-> ulaw@8k).
;
; NOTE on opus: SDP attribute negotiation comes from res_format_attr_opus
; (loaded with the pjsip stack), but actual encode/decode requires
; codec_opus.so. That module is off by default in Asterisk's build
; system; we opt in via `menuselect --enable codec_opus` in the Dockerfile.
; Without it, opus works for pass-through calls only — Asterisk can't
; play MoH, voicemail, or prompts to an opus-using channel.

load = codec_gsm.so
load = codec_opus.so
load = codec_resample.so
load = codec_ulaw.so
load = codec_g722.so

; --- Formats -----------------------------------------------
; On-disk audio formats (voicemail recordings, MoH files, …).

load = format_gsm.so
load = format_pcm.so
load = format_wav_gsm.so
load = format_wav.so

; --- Functions ---------------------------------------------
; Dialplan helpers: ${CALLERID(num)}, ${CDR(...)}, ${PJSIP_ENDPOINT(...)}, …

load = func_callerid.so
load = func_cdr.so
load = func_pjsip_endpoint.so
load = func_sorcery.so
load = func_devstate.so
load = func_strings.so

; --- Core/PBX ----------------------------------------------
; pbx_config.so parses extensions.conf — without it there's no dialplan.

load = pbx_config.so

; --- Resources ---------------------------------------------
; The pjsip stack is built from many small res_pjsip_* modules — each one
; handles a specific extension/feature (auth, NAT, MWI, REFER, etc.).
; res_pjsip.so is the umbrella; the rest plug into it.

load = res_http_websocket.so
load = res_musiconhold.so
load = res_pjproject.so
load = res_pjsip_acl.so
load = res_pjsip_authenticator_digest.so
load = res_pjsip_caller_id.so
load = res_pjsip_dialog_info_body_generator.so
load = res_pjsip_diversion.so
load = res_pjsip_dtmf_info.so
load = res_pjsip_endpoint_identifier_anonymous.so
load = res_pjsip_endpoint_identifier_ip.so
load = res_pjsip_endpoint_identifier_user.so
load = res_pjsip_exten_state.so
load = res_pjsip_header_funcs.so
load = res_pjsip_logger.so
load = res_pjsip_messaging.so
load = res_pjsip_mwi_body_generator.so
load = res_pjsip_mwi.so
load = res_pjsip_nat.so
load = res_pjsip_one_touch_record_info.so
load = res_pjsip_outbound_authenticator_digest.so
load = res_pjsip_outbound_publish.so
load = res_pjsip_outbound_registration.so
load = res_pjsip_path.so
load = res_pjsip_pidf_body_generator.so
load = res_pjsip_pidf_digium_body_supplement.so
load = res_pjsip_pidf_eyebeam_body_supplement.so
load = res_pjsip_publish_asterisk.so
load = res_pjsip_pubsub.so
load = res_pjsip_refer.so
load = res_pjsip_registrar.so
load = res_pjsip_rfc3326.so
load = res_pjsip_sdp_rtp.so
load = res_pjsip_send_to_voicemail.so
load = res_pjsip_session.so
load = res_pjsip.so
load = res_pjsip_t38.so
load = res_pjsip_transport_websocket.so
load = res_pjsip_xpidf_body_generator.so
load = res_rtp_asterisk.so
load = res_sorcery_astdb.so
load = res_sorcery_config.so
load = res_sorcery_memory.so
load = res_sorcery_realtime.so
load = res_timing_timerfd.so

; --- Explicit noloads --------------------------------------
; HEP (Homer Encapsulation Protocol) — packet capture for SIP capture/analytics
; servers like Homer (sipcapture.org). Not used here.

noload = res_hep.so
noload = res_hep_pjsip.so
noload = res_hep_rtcp.so
