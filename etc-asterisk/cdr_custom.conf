; /etc/asterisk/cdr_custom.conf — CSV format for the cdr_custom backend.
;
; Output is written to /var/log/asterisk/cdr-custom/Master.csv. One line
; per call, columns in the order listed below. CSV_QUOTE escapes commas
; and quotes inside fields so the file remains parseable.
;
; Columns (in order):
;   clid          calling line identification (caller name + number)
;   src           source extension
;   dst           dialed extension
;   dcontext      destination context (which dialplan context the call hit)
;   channel       source channel name (e.g. PJSIP/6001-00000001)
;   dstchannel    destination channel
;   lastapp       last application run (Dial, Voicemail, …)
;   lastdata      arguments to that application
;   start         call start time
;   answer        when the destination picked up (empty if no answer)
;   end           call end time
;   duration      total call seconds (start → end)
;   billsec       seconds the call was connected (answer → end)
;   disposition   ANSWERED / NO ANSWER / BUSY / FAILED
;   amaflags      billing-flags hint
;   accountcode   per-call accounting tag (rarely used in a home PBX)
;   uniqueid      unique channel ID — use this to correlate across log lines
;   userfield     free-form per-call string set from the dialplan
;   sequence      monotonically increasing sequence number

[mappings]
Master.csv => ${CSV_QUOTE(${CDR(clid)})},${CSV_QUOTE(${CDR(src)})},${CSV_QUOTE(${CDR(dst)})},${CSV_QUOTE(${CDR(dcontext)})},${CSV_QUOTE(${CDR(channel)})},${CSV_QUOTE(${CDR(dstchannel)})},${CSV_QUOTE(${CDR(lastapp)})},${CSV_QUOTE(${CDR(lastdata)})},${CSV_QUOTE(${CDR(start)})},${CSV_QUOTE(${CDR(answer)})},${CSV_QUOTE(${CDR(end)})},${CSV_QUOTE(${CDR(duration)})},${CSV_QUOTE(${CDR(billsec)})},${CSV_QUOTE(${CDR(disposition)})},${CSV_QUOTE(${CDR(amaflags)})},${CSV_QUOTE(${CDR(accountcode)})},${CSV_QUOTE(${CDR(uniqueid)})},${CSV_QUOTE(${CDR(userfield)})},${CDR(sequence)}
