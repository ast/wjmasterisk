; /etc/asterisk/pjsip.conf
;
; Layout:
;   1. Transports (UDP / TCP / TLS)
;   2. Templates for the three endpoint classes (softphone / ata / mobile)
;   3. Endpoint definitions — each phone is ~6 lines using a template.
;
; Numbering convention (dialplan accepts any 6XXX):
;   6001-6009  softphones (LAN, UDP/TCP)
;   6010-6019  ATAs / POTS adapters (LAN, UDP only, G.711)
;   6020-6029  mobile / remote SIP clients (TLS + SRTP)
;
; Template syntax recap:
;   [name](!)               section is a *template* — never used directly,
;                           only inherited from.
;   [endpoint](tpl1,tpl2)   endpoint inherits from tpl1, then tpl2.

;; ============================================================
;;  Transports
;; ============================================================
[transport-defaults](!)
type=transport

; local_net: traffic to/from these networks is treated as on-LAN, so NAT
; workarounds (rewrite_contact, force_rport, etc.) are NOT applied to it.
; Anything OUTSIDE these ranges is treated as remote → NAT mitigations kick in.
local_net=127.0.0.0/8
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=100.64.0.0/10        ; Tailscale CGNAT — overlay traffic looks local

; If this PBX is reachable on a public IP, set both to that public IP/host so
; outbound SDP and Contact headers contain the right address. Leave commented
; for LAN-only or VPN-only deployments (e.g. behind Tailscale).
;external_media_address=203.0.113.8
;external_signaling_address=203.0.113.8

[transport-udp](transport-defaults)
protocol=udp
bind=0.0.0.0:5060              ; standard SIP/UDP — what most softphones default to

[transport-tcp](transport-defaults)
protocol=tcp
bind=0.0.0.0:5060              ; same port, TCP — useful for long headers and TLS fallback

[transport-tls](transport-defaults)
protocol=tls
bind=0.0.0.0:5061              ; standard SIPS port
method=tlsv1_2                 ; minimum TLS version; modern clients negotiate 1.3 anyway
cert_file=/etc/asterisk/keys/asterisk.pem      ; from etc-asterisk/keys/ (bind-mounted)
priv_key_file=/etc/asterisk/keys/asterisk.key  ; generate with `just gen-keys`
; Self-signed setup → don't demand a client cert as well.
verify_client=no
require_client_cert=no

;; ============================================================
;;  Endpoint templates
;; ============================================================
[endpoint-defaults](!)
type=endpoint
context=internal               ; dialplan context that calls from this phone land in
disallow=all                   ; clear the default codec list before…
allow=opus,g722,ulaw,alaw      ; …explicitly listing ours. ORDER = preference.
                               ;   opus  — best for mobile/internet (low bw, robust)
                               ;   g722  — HD audio for desk phones
                               ;   ulaw  — G.711 µ-law, universal fallback (ATAs)
                               ;   alaw  — G.711 A-law, common in Europe

; NAT-safe defaults. Harmless on LAN, essential off-LAN.
rtp_symmetric=yes              ; reply RTP to whatever source:port the client sent from
force_rport=yes                ; trust apparent source port over what the SIP header claims
rewrite_contact=yes            ; rewrite the endpoint's Contact to its real source IP
direct_media=no                ; always relay RTP through Asterisk.
                               ; YES = peers stream straight to each other (faster, but
                               ;       breaks the instant either side is behind NAT).
                               ; NO  = bulletproof, costs a bit of CPU/bandwidth.

dtmf_mode=auto                 ; let Asterisk pick: RFC2833 > SIP INFO > inband.

[softphone](!,endpoint-defaults)
; LAN softphones (Linphone, MicroSIP, Zoiper, etc.). Defaults are good.

[ata](!,endpoint-defaults)
; FXS / POTS adapters (Grandstream HT80x, OBi202, Cisco SPA112, …).
; These typically only speak G.711, so narrow the codec list to avoid
; failed negotiations and unnecessary transcoding.
allow=ulaw,alaw

[mobile](!,endpoint-defaults)
; Remote SIP client (cellular / public WiFi, or via Tailscale).
; TLS+SRTP is the modern minimum for anything traversing the open internet.
media_encryption=sdes          ; SRTP keyed via SDES (keys ride inside the TLS signaling).
                               ; Alternative: media_encryption=dtls (more secure but
                               ; more setup; not all mobile clients support it well).
transport=transport-tls        ; force this endpoint onto the TLS transport (port 5061).

[auth-userpass](!)
type=auth
auth_type=userpass             ; cleartext username/password (sent over TLS for mobile)

[aor-single](!)
type=aor
max_contacts=1                 ; one device per extension. Bump to 2+ if you want
                               ; e.g. a desk phone + softphone sharing the same number.
qualify_frequency=60           ; OPTIONS ping every 60 s. Two purposes:
                               ;   1. detects when an endpoint silently drops off
                               ;   2. keeps NAT pinholes open for inbound calls

;; ============================================================
;;  Endpoints — softphones (6001-6009)
;; ============================================================
; Each phone is three sections:
;   [NNNN](softphone)         endpoint — points at its auth and aor
;   [authNNNN](auth-userpass) credentials for SIP registration
;   [NNNN](aor-single)        AOR — describes where the phone can be reached

[6001](softphone)
auth=auth6001
aors=6001
[auth6001](auth-userpass)
username=6001
password=6001                  ; change me
[6001](aor-single)

[6002](softphone)
auth=auth6002
aors=6002
[auth6002](auth-userpass)
username=6002
password=6002                  ; change me
[6002](aor-single)

[6003](softphone)
auth=auth6003
aors=6003
[auth6003](auth-userpass)
username=6003
password=6003                  ; change me
[6003](aor-single)

[6004](softphone)
auth=auth6004
aors=6004
[auth6004](auth-userpass)
username=6004
password=6004                  ; change me
[6004](aor-single)

;; ============================================================
;;  Endpoints — ATAs / POTS adapters (6010-6019)
;;  For analogue phones connected via a SIP-to-FXS adapter.
;; ============================================================
[6010](ata)
auth=auth6010
aors=6010
[auth6010](auth-userpass)
username=6010
password=6010                  ; change me
[6010](aor-single)

[6011](ata)
auth=auth6011
aors=6011
[auth6011](auth-userpass)
username=6011
password=6011                  ; change me
[6011](aor-single)

;; ============================================================
;;  Endpoints — mobile / remote (6020-6029)
;;  TLS + SRTP. The client must trust etc-asterisk/keys/asterisk.pem
;;  (or have certificate verification disabled).
;; ============================================================
[6020](mobile)
auth=auth6020
aors=6020
[auth6020](auth-userpass)
username=6020
password=6020                  ; change me
[6020](aor-single)

[6021](mobile)
auth=auth6021
aors=6021
[auth6021](auth-userpass)
username=6021
password=6021                  ; change me
[6021](aor-single)
