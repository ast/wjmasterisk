; /etc/asterisk/pjsip.conf
;
; Layout:
;   1. Transports (UDP / TCP / TLS)
;   2. Templates for the three endpoint classes (softphone / ata / mobile)
;   3. Endpoint definitions — each phone is just ~6 lines using a template.
;
; Numbering convention (dialplan accepts any 6XXX):
;   6001-6009  softphones (LAN, UDP/TCP)
;   6010-6019  ATAs / POTS adapters (LAN, UDP only, G.711)
;   6020-6029  mobile / remote SIP clients (TLS + SRTP)

;; ============================================================
;;  Transports
;; ============================================================
[transport-defaults](!)
type=transport
; Don't apply NAT workarounds for traffic that stays on these nets.
local_net=127.0.0.0/8
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=100.64.0.0/10        ; Tailscale CGNAT
; Public IP — set if exposing SIP-TLS to the open internet.
; external_media_address=203.0.113.8
; external_signaling_address=203.0.113.8

[transport-udp](transport-defaults)
protocol=udp
bind=0.0.0.0:5060

[transport-tcp](transport-defaults)
protocol=tcp
bind=0.0.0.0:5060

[transport-tls](transport-defaults)
protocol=tls
bind=0.0.0.0:5061
method=tlsv1_2
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key
verify_client=no
require_client_cert=no

;; ============================================================
;;  Endpoint templates
;; ============================================================
[endpoint-defaults](!)
type=endpoint
context=internal
disallow=all
allow=opus,g722,ulaw,alaw      ; opus for mobile/softphone, g711 fallback for ATAs
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no                ; always relay — NAT-safe
dtmf_mode=auto

[softphone](!,endpoint-defaults)
; LAN softphones; modern codecs work out of the box

[ata](!,endpoint-defaults)
allow=ulaw,alaw                ; POTS adapters: G.711 only

[mobile](!,endpoint-defaults)
media_encryption=sdes          ; SRTP for the public-internet leg
transport=transport-tls        ; force TLS:5061

[auth-userpass](!)
type=auth
auth_type=userpass

[aor-single](!)
type=aor
max_contacts=1
qualify_frequency=60           ; keep NAT bindings warm

;; ============================================================
;;  Endpoints — softphones (6001-6009)
;; ============================================================
[6001](softphone)
auth=auth6001
aors=6001
[auth6001](auth-userpass)
username=6001
password=6001                  ; change me
[6001](aor-single)

[6002](softphone)
auth=auth6002
aors=6002
[auth6002](auth-userpass)
username=6002
password=6002                  ; change me
[6002](aor-single)

[6003](softphone)
auth=auth6003
aors=6003
[auth6003](auth-userpass)
username=6003
password=6003                  ; change me
[6003](aor-single)

[6004](softphone)
auth=auth6004
aors=6004
[auth6004](auth-userpass)
username=6004
password=6004                  ; change me
[6004](aor-single)

;; ============================================================
;;  Endpoints — ATAs / POTS adapters (6010-6019)
;;  Use these for analogue phones via a SIP-to-FXS adapter
;;  (Grandstream HT8xx, OBi202, Cisco SPA112, etc.)
;; ============================================================
[6010](ata)
auth=auth6010
aors=6010
[auth6010](auth-userpass)
username=6010
password=6010                  ; change me
[6010](aor-single)

[6011](ata)
auth=auth6011
aors=6011
[auth6011](auth-userpass)
username=6011
password=6011                  ; change me
[6011](aor-single)

;; ============================================================
;;  Endpoints — mobile / remote (6020-6029)
;;  TLS + SRTP. The client must trust etc-asterisk/keys/asterisk.pem
;;  (or have certificate verification disabled).
;; ============================================================
[6020](mobile)
auth=auth6020
aors=6020
[auth6020](auth-userpass)
username=6020
password=6020                  ; change me
[6020](aor-single)

[6021](mobile)
auth=auth6021
aors=6021
[auth6021](auth-userpass)
username=6021
password=6021                  ; change me
[6021](aor-single)
