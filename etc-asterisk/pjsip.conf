; /etc/asterisk/pjsip.conf

;; ========== Transport defaults ==========
[transport-defaults](!)
type = transport
; For communication to any addresses within local_nets, Asterisk will not apply
; NAT-related workarounds.
local_net = 127.0.0.0/8
local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16

; For communication to any addresses within local_nets, Asterisk will not apply
; NAT-related workarounds.
local_net = 127.0.0.0/8
local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16
local_net = 100.64.0.0/10

; If you have a public static IP for your Asterisk server, set it here.
; external_media_address     = 203.0.113.8
; external_signaling_address = 203.0.113.8

;; ========== Transport ==========
[transport-udp](transport-defaults)
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp](transport-defaults)
type=transport
protocol=tcp
bind=0.0.0.0:5060

; ======== 3 local extensions ========

; --- 6001 ---
[6001]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=auth6001
aors=6001
; NAT-friendly defaults for phones behind NAT / Docker
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no

[auth6001]
type=auth
auth_type=userpass
username=6001
password=6001        ; change me

[6001]
type=aor
max_contacts=1


