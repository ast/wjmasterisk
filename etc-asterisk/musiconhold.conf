; /etc/asterisk/musiconhold.conf — what to play while a caller is on hold.
;
; Each named section is a "MoH class". The dialplan or pjsip endpoint can
; pick a class; with no override, [default] is used.
;
; mode=files plays audio files from `directory`, relative to
; /var/lib/asterisk/moh/. That directory ships with a small set of public
; sample tracks. Drop your own .wav / .gsm / .ulaw / .ogg files there to
; replace them (and run `moh reload` from the CLI).

[general]

[default]
mode = files
directory = moh
