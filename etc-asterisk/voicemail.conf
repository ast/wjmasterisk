; /etc/asterisk/voicemail.conf
;
; Mailboxes live in a context (here [default]). The dialplan refers to
; them via `Voicemail(EXT@default,...)` and `VoiceMailMain(EXT@default)`.
;
; The `format` setting controls which audio encodings new messages are
; stored in. wav49 (GSM-in-WAV) is what most voicemail-to-email tools
; handle natively, so keep it first.

[general]
format=wav49|gsm|wav

; Mailbox line syntax:
;   mailbox => pin,Full Name[,email[,pager[,options]]]
;
; The PIN is what the user types at *97 to access the mailbox. Set it to
; something non-trivial before letting anyone touch a handset. Add `email`
; (a real address) to get voicemail-to-email delivery, but that requires
; configuring an SMTP relay too (not done in this minimal setup).

[default]
6001 => 1234,Softphone 1
6002 => 1234,Softphone 2
6003 => 1234,Softphone 3
6004 => 1234,Softphone 4
6010 => 1234,ATA Line 1
6011 => 1234,ATA Line 2
6020 => 1234,Mobile 1
6021 => 1234,Mobile 2
