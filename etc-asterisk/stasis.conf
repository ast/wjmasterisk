; Stasis configuration. The section name changed from [threadpool] to
; [taskpool] in Asterisk 23; presence of this file suppresses a startup
; warning emitted by the default-synthesis path. Defaults are fine.
; See configs/samples/stasis.conf.sample in the source for all options.

[taskpool]
;minimum_size = 5
;initial_size = 5
;idle_timeout_sec = 20
;max_size = 50

[declined_message_types]
