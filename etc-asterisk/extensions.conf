; /etc/asterisk/extensions.conf — dialplan
;
; Every registered phone enters this context (set in pjsip.conf via
; [endpoint-defaults]: context=internal). From here it can dial other
; extensions, voicemail, or feature codes.
;
; Dialplan line anatomy:
;   exten => <pattern>,<priority>,<application>(<args>)
;   same  => n,<application>(<args>)        ; "next priority" — continues the
;                                             ; previously-defined extension
; ${EXTEN} expands to the dialed number; ${CALLERID(num)} to the caller's.

[internal]

; _6XXX matches any 4-digit number starting with 6 (so any of 6001..6029).
; Underscore = pattern, X = any digit. ${EXTEN} carries the dialed number,
; so this single rule handles every phone we ever add to pjsip.conf.
; 30 = ring timeout in seconds before falling through to voicemail.
exten => _6XXX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Voicemail(${EXTEN}@default,u)   ; 'u' = play the "user is unavailable" greeting
 same => n,Hangup()

; *97 — check your OWN mailbox. VoiceMailMain prompts for PIN.
; ${CALLERID(num)} is the dialing extension, so the user lands in their own box.
exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; *43 — echo test. Dial this from any phone to verify the audio path is
; healthy end-to-end. The single most useful diagnostic when an ATA or
; mobile leg shows one-way audio (or no audio).
exten => *43,1,Answer()
 same => n,Wait(1)
 same => n,Echo()
 same => n,Hangup()

; *44 — music on hold. Plays continuous audio (the [default] MoH class
; from musiconhold.conf, looking at /var/lib/asterisk/moh/). One-client
; audio test: dial *44, listen for music, hang up.
exten => *44,1,Answer()
 same => n,MusicOnHold()
 same => n,Hangup()

; --- Rotary-phone aliases -----------------------------------------
; Rotary (pulse-dial) phones have no '*' or '#' keys, so the feature
; codes above are unreachable from them. These plain-number aliases
; in the 8xx range jump to the same logic. Goto keeps one source of
; truth — the *XX extensions stay the canonical definition.
; (802 reaches voicemail but PIN entry needs DTMF a rotary can't send,
;  so it's only useful from a touch-tone phone — listed for symmetry.)
exten => 800,1,Goto(*43,1)    ; echo test
exten => 801,1,Goto(*44,1)    ; music on hold — connectivity check
exten => 802,1,Goto(*97,1)    ; voicemail (DTMF needed for PIN)
