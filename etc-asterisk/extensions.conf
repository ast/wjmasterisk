[internal]
; Dial any 6XXX extension; fall through to voicemail on no-answer.
exten => _6XXX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Voicemail(${EXTEN}@default,u)
 same => n,Hangup()

; *97 — check your own voicemail
exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; *43 — echo test (dial this to verify audio path; great for ATA/mobile diag)
exten => *43,1,Answer()
 same => n,Wait(1)
 same => n,Echo()
 same => n,Hangup()
