; /etc/asterisk/cdr.conf — Call Detail Records (high-level switches).
;
; CDR records one summary line per call (start/end/duration/disposition/…).
; The actual log destination is configured by the loaded cdr_* backends:
; here, cdr_custom.so writes CSV (see cdr_custom.conf).

[general]
enable=yes                ; turn CDR on globally

[custom]
loguniqueid=yes           ; include the unique channel ID — invaluable when
                          ; correlating a single call across multiple log lines
