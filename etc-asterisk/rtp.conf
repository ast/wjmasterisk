; /etc/asterisk/rtp.conf — UDP port range used for RTP audio.
;
; Each active call uses 2 ports (one each direction). The range here must:
;   1. Be wide enough for the max number of concurrent calls you expect.
;   2. Match the `-p 10000-10010:10000-10010/udp` mapping in the justfile
;      and docker-compose.yml.
;   3. Match the EXPOSE line in the Dockerfile.
;
; The default Asterisk range is 10000-20000 (5000 calls). 10 ports here = up
; to 5 simultaneous calls — fine for a home PBX, easy to widen if needed.

[general]
rtpstart=10000
rtpend=10010
